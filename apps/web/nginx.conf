server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — file-based routes are client-side
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API reverse proxy (same-origin; SSE-friendly)
  location /api/ {
    proxy_pass http://api:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # G-3 attachments: 10MB binary → ~13.7MB base64 JSON (api caps at 15mb)
    client_max_body_size 16m;
    # SSE: no buffering, long timeouts
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # static assets: long cache (hashed filenames)
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
