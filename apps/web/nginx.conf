# Phase 3 C-3: edge-facing hardening for Cloudflare Tunnel.
# The public signup flow intentionally remains enabled.
# Cloudflare sends CF-Connecting-IP; if absent (local checks), fall back to the
# socket address. Nginx maps run in the http context, and conf.d files are
# included there.
map $http_cf_connecting_ip $rate_limit_key {
  default $http_cf_connecting_ip;
  "" $binary_remote_addr;
}

limit_req_zone $rate_limit_key zone=api_general:10m rate=60r/m;
limit_req_zone $rate_limit_key zone=auth_signup:10m rate=10r/m;
limit_req_zone $rate_limit_key zone=chat_stream:10m rate=20r/m;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Cloudflare Tunnel terminates public TLS at the edge, then forwards HTTP to
  # this origin. Redirect only truly-public HTTP requests; local 127.0.0.1 checks
  # and Docker-internal traffic remain usable.
  if ($http_x_forwarded_proto = "http") {
    return 301 https://$host$request_uri;
  }

  # Security headers. CSP allows the small inline theme FOUC guard in index.html.
  # Shared snippet so locations that add their own headers (Cache-Control) keep
  # the security set — nginx add_header inheritance is all-or-nothing per level.
  include /etc/nginx/snippets/security-headers.conf;

  # SPA fallback — file-based routes are client-side.
  # SW deployment safety (2026-07-06): index.html must NEVER be cached by the
  # browser or an edge; a stale HTML referencing deleted hashed chunks causes
  # "Failed to fetch dynamically imported module" and can create reload loops.
  location / {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ /index.html;
  }

  # Service worker + version manifest: always revalidate. A long-cached sw.js is
  # the classic "killswitch takes days to roll out" horror story — never cache it.
  location ~ ^/(sw\.js|version\.json|manifest\.webmanifest)$ {
    include /etc/nginx/snippets/security-headers.conf;
    # Cloudflare can apply a browser-cache TTL to cacheable .js extensions even
    # when it revalidates at the edge; service workers must not be browser-cached.
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header CDN-Cache-Control "no-store" always;
    add_header Cloudflare-CDN-Cache-Control "no-store" always;
    try_files $uri =404;
  }

  # Stricter limits for auth/signup while keeping public signup enabled.
  location ~ ^/api/auth/(login|signup|refresh)$ {
    limit_req zone=auth_signup burst=20 nodelay;
    limit_req_status 429;
    proxy_pass http://api:3000/auth/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $http_cf_connecting_ip;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    client_max_body_size 1m;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # Chat SSE can be long-lived; limit connection creation, not stream duration.
  location = /api/chat/stream {
    limit_req zone=chat_stream burst=10 nodelay;
    limit_req_status 429;
    proxy_pass http://api:3000/chat/stream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $http_cf_connecting_ip;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    client_max_body_size 1m;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # API reverse proxy (same-origin; SSE-friendly)
  location /api/ {
    limit_req zone=api_general burst=120 nodelay;
    limit_req_status 429;
    proxy_pass http://api:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $http_cf_connecting_ip;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    # G-3 attachments: 10MB binary → ~13.7MB base64 JSON (api caps at 15mb)
    client_max_body_size 16m;
    # SSE: no buffering, long timeouts
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # static assets: long cache (hashed filenames)
  location /assets/ {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
