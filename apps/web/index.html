<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="지구 컨설팅 워크스페이스 — AI와 함께하는 프로젝트 협업" />
    <meta name="theme-color" content="#5e6ad2" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Consulting Web · 지구 워크스페이스</title>
    <script>
      // G-1 FOUC guard: apply stored theme before first paint.
      (function () {
        try {
          var t = localStorage.getItem('consulting.theme.v1');
          if (t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches && t === 'system')) {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
