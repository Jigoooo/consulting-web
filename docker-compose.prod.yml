# Docker internal deployment (Phase 1.9). Ports chosen to avoid existing
# dev services (pg 5434 / redis 6380 host stack stays untouched).
# Web entry: http://127.0.0.1:8088  (nginx → api → docker pg/redis + host Hermes)

name: consulting-web

services:
  pg:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    environment:
      POSTGRES_USER: consulting
      POSTGRES_PASSWORD: ${PG_PASSWORD:?set in .env.docker}
      POSTGRES_DB: consulting
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U consulting -d consulting']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Shared consulting brain store. This is distinct from the app metadata DB (`pg`).
  # The schema-aware healthcheck keeps API startup fail-closed on an empty/unrestored volume.
  brain-pg:
    image: pgvector/pgvector:pg18@sha256:212765b63c1462883de295c4c415edcd22191b8d8d46853e86ad05d4b577a4cb
    environment:
      POSTGRES_USER: consulting
      POSTGRES_PASSWORD: ${PG_PASSWORD:?set in .env.docker}
      POSTGRES_DB: consulting
    ports:
      - '127.0.0.1:55418:5432'
    volumes:
      - brain-pg-data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" &&
          test "$$(psql -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -Atqc
          "SELECT (to_regclass('brain_raw.topics') IS NOT NULL AND
          to_regclass('brain_rag.chunk_texts') IS NOT NULL)::int")" = 1
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  hermes-proxy:
    image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
    # Bridges Docker network -> WSL-local Hermes gateway bound on 127.0.0.1:8642.
    # It listens only on the host network; web exposure still remains 127.0.0.1:8088.
    network_mode: host
    command: >
      sh -c "apk add --no-cache socat >/dev/null &&
      socat TCP-LISTEN:38642,fork,reuseaddr,bind=0.0.0.0 TCP:127.0.0.1:8642"
    healthcheck:
      test: ['CMD-SHELL', 'nc -z 127.0.0.1 38642']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://consulting:${PG_PASSWORD}@pg:5432/consulting
    entrypoint: ['node', 'docker-migrate.mjs']
    working_dir: /app
    depends_on:
      pg:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_ENV: production
      APP_PUBLIC_URL: http://127.0.0.1:8088
      PORT: '3000'
      DATABASE_URL: postgres://consulting:${PG_PASSWORD}@pg:5432/consulting
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set in .env.docker}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set in .env.docker}
      HERMES_API_BASE_URL: http://host.docker.internal:38642
      HERMES_API_KEY: ${HERMES_API_KEY:?set in .env.docker}
      HERMES_CONFIG_PATH: /brain/hermes.config.yaml
      # Explicit rollout only. The reviewer endpoint must expose zero enabled toolsets.
      ARTIFACT_RED_TEAM_MODE: ${ARTIFACT_RED_TEAM_MODE:-off}
      ARTIFACT_RED_TEAM_API_BASE_URL: ${ARTIFACT_RED_TEAM_API_BASE_URL:-}
      ARTIFACT_RED_TEAM_API_KEY: ${ARTIFACT_RED_TEAM_API_KEY:-}
      CONSULTING_INSIGHT_WEB_SHADOW_MODE: shadow
      CONSULTING_INSIGHT_WEB_SHADOW_THREAD_IDS: 6b6657a8-2d23-4300-a621-4773ad1117f8
      CONSULTING_INSIGHT_POLICY_HASH: 3e90693571665bc34d8a964c3ced56e8262469b3e369374e3988424f07b67ed9
      REPORT_WORKFLOW_SHADOW_MODE: ${REPORT_WORKFLOW_SHADOW_MODE:-observe}
      CONSULTING_BRAIN_ROOT: /brain/consulting
      HERMES_ENV_FILE: /brain/hermes.env
      CONSULTING_PYTHON: python3
      CONSULTING_WEB_INGEST_SCRIPT: /app/scripts/ingest_web_dialogue.py
      # Phase 11 PG18 controlled runtime cutover: PG is the active runtime;
      # SQLite remains mounted only for explicit fallback/rollback diagnostics.
      CONSULTING_BRAIN_BACKEND: pg
      CONSULTING_BRAIN_WRITE_BACKEND: pg
      CONSULTING_PG_DSN_DRIVER: psycopg
      CONSULTING_PG_DSN: postgres://consulting:${PG_PASSWORD:?set in .env.docker}@brain-pg:5432/consulting
      CONSULTING_SHADOW_LOG_DIR: /brain/consulting/backups/pg18-migration/shadow-api
      CONSULTING_WRITE_LOG_DIR: /brain/consulting/backups/pg18-migration/write-shadow-api
      # Web Push (optional — endpoints degrade to no-op when unset)
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@localhost}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - /home/jigoo/.hermes/workspace/consulting:/brain/consulting
      - /home/jigoo/.hermes/.env:/brain/hermes.env:ro
      - /home/jigoo/.hermes/config.yaml:/brain/hermes.config.yaml:ro
    depends_on:
      pg:
        condition: service_healthy
      brain-pg:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      hermes-proxy:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:3000/health/live >/dev/null || exit 1']
      interval: 10s
      timeout: 4s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  web:
    image: ${CONSULTING_WEB_IMAGE:-sha256:dd65c6a9a22db4015f94fd70a27e66d3f62b1bd2df0ef83e3421f2f48822a4fc}
    ports:
      - '127.0.0.1:8088:80'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data:
  brain-pg-data:
  redis-data:
